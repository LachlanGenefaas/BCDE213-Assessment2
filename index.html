loadShader(
  "blobGradient",
  `vec4 vert(vec2 pos, vec2 uv, vec4 color) {
    return def_vert();
  }`,
  `
  uniform float u_time;
  uniform float u_speed;
  uniform float u_blobCount;
  uniform float u_size;
  uniform float u_motion;

  float hash(float n) {
    return fract(sin(n) * 43758.5453);
  }

  vec3 palette(float t) {
    return vec3(
      0.5 + 0.5 * sin(t + 0.0),
      0.5 + 0.5 * sin(t + 2.1),
      0.5 + 0.5 * sin(t + 4.2)
    );
  }

  vec4 frag(vec2 pos, vec2 uv, vec4 color, sampler2D tex) {

    vec4 base = texture2D(tex, uv);
    vec3 col = base.rgb;

    int COUNT = int(u_blobCount);

    for (int i = 0; i < 10; i++) { // fixed loop cap for GLSL
      if (i >= COUNT) break;

      float fi = float(i);
      float seed = fi * 10.0;

      vec2 center = vec2(
        hash(seed + 1.0),
        hash(seed + 2.0)
      );

      // SPEED controls animation rate
      float t = u_time * u_speed;

      center += u_motion * vec2(
        sin(t + fi * 2.0),
        cos(t + fi * 1.7)
      );

      float size = u_size * (0.8 + 0.4 * sin(t * 0.5 + fi));

      float dist = distance(uv, center);

      float blob = smoothstep(size, 0.0, dist);

      vec3 blobColor = palette(seed + t * 0.2);

      col += blobColor * blob * 0.6;
    }

    return vec4(col, base.a);
  }
  `
);

  uniform float u_time;

  vec4 frag(vec2 pos, vec2 uv, vec4 color, sampler2D tex) {

    vec4 texColor = texture2D(tex, uv);

    // --- scanlines ---
    float scan = sin(uv.y * 16000.0) * 0.005;

    // --- flicker ---
    float flicker = sin(u_time * 0.80) * 0.01;

    // --- CRT tint ---
    vec3 tint = vec3(1.0, 0.98, 0.95);

    vec3 finalColor = texColor.rgb * tint;
    finalColor -= scan;
    finalColor += flicker;

    return vec4(finalColor * texColor.a, texColor.a);
  }`
);

function createWindow(x, y, position) {
  let window = add([
    //sprite("square"),
    rect(x, 20),
    scale(1),
    pos(position.x, position.y),
    "moveable",
    body(),
    color("#444444"),
    z(1),
    area()
  ]);
  let windowBody = window.add([
    // has to be first child for boundary
    rect(x, y - 20),
    pos(0, 20),
    color("#555555"),
    //body(), // to avoid clickthrough // doesnt work
    z(1),
    "windowBody",
    area()
  ]);
  let closeButton = window.add([
    // X
    rect(30, 20),
    pos(x - 30, 0),
    color("#FF5555"),
    z(1),
    area(),
    "closeButton"
  ]);
  window.add([
    // X text
    text("x", { size: 20 }),
    color("#660000"),
    z(1),
    pos(x - 23, -2)
  ]);
  window.add([
    // -
    rect(30, 20),
    pos(x - 60, 0),
    color("#555555"),
    z(1),
    area(),
    "hideButton"
  ]);
  window.add([
    // - text
    text("_", { size: 20 }),
    color("#222222"),
    z(1),
    pos(x - 53, -6)
  ]);
  let windowContent = window.add([
    area(),
    sprite("mark"),
    pos(x / 2, y / 2),
    anchor("center"),
    body(),
    area(),
    z(1)
  ]);
  return window;
}
function addEmail(window, image, subject, emailText, index) {
  let emailSelector = window.add([
    rect(180, 40),
    pos(10, -10 + 40 * index),
    //body(),
    area(),
    z(1),
    "emailSelector",
    `${index}`
  ]);
  window.add([
    // image
    sprite(image, { width: 25, height: 25 }),
    pos(15, -2.5 + 40 * index),
    z(1)
  ]);
  window.add([
    text(subject, { size: 12 }),
    pos(50, 2.5 + 40 * index),
    color("#222222"),
    z(1)
  ]);
  let emailBody = window.add([
    rect(478, 406),
    pos(195, 30),
    z(1),
    `${index}`,
    "email"
  ]);
  window.add([
    sprite(image, { width: 60, height: 60 }),
    pos(210, 55),
    z(1),
    scale(0.75),
    `${index}`,
    "email"
  ]);
  window.add([
    text(subject, { size: 16 }),
    pos(210, 120),
    color("#222222"),
    z(1),
    `${index}`,
    "email"
  ]);
  window.add([
    text(emailText, { size: 16, width: 460 }),
    pos(210, 150),
    color("#222222"),
    z(1),
    `${index}`,
    "email"
  ]);
  window.get("email").forEach((child) => {
    child.hidden = false;
    child.opacity = 0;
  });
  return emailSelector;
}

function closeWindow(window, pos2, type) {
  if (type == 0) {
    window.hidden = true;
    window.opacity = 0;
  } else {

    });
  }

    pos(120, 320)
    // {
    //     maxWidth: boxWidth - 300,
    // }
  ]);
  const lines = [
    "Hello there! (SPACEBAR)",
    "This project is for a school assessment that will be submitted fashionably late.",
    "There is no tutorial as I do not care to make one.",
    "Press space to start."
  ];
  let currentLine = 0;
  let charIndex = 0;
  let typing = true;
  function startLine() {
    textObj.text = "";
    charIndex = 0;
    typing = true;
  }
  startLine();
  onUpdate(() => {
    if (!typing) return;
    const fullText = lines[currentLine];
    if (charIndex < fullText.length) {
      charIndex++;
      textObj.text = fullText.slice(0, charIndex);
    } else {
      typing = false;
    }
  });
  onKeyPress("space", () => {
    if (typing) {
      textObj.text = lines[currentLine];
      typing = false;
    } else {
      currentLine++;
      if (currentLine >= lines.length) {
        go("game");
        currentLine = 0;
      }
      startLine();
    }
  });
});
